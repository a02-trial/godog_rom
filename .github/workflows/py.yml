name: Cleanup Old Tools

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Remove old tools
        run: |
          rm -f tools/img2sdat.py
          rm -f tools/blockimgdiff.py
          rm -f tools/sparse_img.py
          rm -f tools/rangelib.py
          rm -f tools/common.py
          echo "=== Remaining tools ==="
          ls -lh tools/

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/
          git commit -m "Cleanup old img2sdat tools" || echo "Nothing to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
